name: Docker Image CI

on:
  push:
    branches: [ "main", "master", "develop" ]
    tags: [ 'v*.*.*' ]
    paths-ignore:
      - 'README.md'
      - '.github/**'
      - 'screenshots/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version tag (e.g. 1.9.1). If left blank, it will be parsed from CHANGELOG.md.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME will be set dynamically to ensure lowercase

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Determine version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | head -n 1)
          fi
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Downcase Image Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=${{ env.APP_VERSION }},enable=${{ env.APP_VERSION != '' }}
            type=raw,value=v${{ env.APP_VERSION }},enable=${{ env.APP_VERSION != '' }}
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
