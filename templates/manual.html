{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Manual Entry</h1>
        <p>Record your metrics directly to Garmin Connect.</p>
    </div>
    <div class="info-chip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        No Withings Required
    </div>
</div>

<div class="card" style="max-width: 680px;">
    <div class="card-header">
        <div class="card-title">
            <div class="card-title-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path
                        d="M6 2l3 6h6l3-6M9 8v6a3 3 0 006 0V8M6 22h12a2 2 0 002-2v-5H4v5a2 2 0 002 2z">
                    </path>
                </svg>
            </div>
            <div>
                <h2>Body Metrics</h2>
                <p class="card-desc" style="margin: 2px 0 0;">Enter your measurements below.</p>
            </div>
        </div>

        <div class="segmented" role="radiogroup">
            <label id="unit-kg-label" class="active">
                <input type="radio" name="unit" value="kg" checked onchange="updateUnits('kg')">
                Metric (kg)
            </label>
            <label id="unit-lbs-label">
                <input type="radio" name="unit" value="lbs" onchange="updateUnits('lbs')">
                Imperial (lbs)
            </label>
        </div>
    </div>

    <form id="manual-form" class="mt-4">
        <input type="hidden" name="selected_unit" id="selected_unit" value="kg">

        <div class="input-group">
            <label for="timestamp">Date & Time</label>
            <input type="datetime-local" id="timestamp" name="timestamp">
        </div>

        <div class="form-grid-2">
            <div class="input-group">
                <label for="weight">Weight (<span class="unit-label">kg</span>) *</label>
                <input type="number" id="weight" name="weight" step="0.01" required placeholder="0.00">
            </div>
            <div class="input-group">
                <label for="fat_ratio">Body Fat (%)</label>
                <input type="number" id="fat_ratio" name="fat_ratio" step="0.1" placeholder="0.0">
            </div>
        </div>

        <div class="form-grid-2">
            <div class="input-group">
                <label for="muscle_mass">Muscle Mass (<span class="unit-label">kg</span>)</label>
                <input type="number" id="muscle_mass" name="muscle_mass" step="0.1" placeholder="0.0">
            </div>
            <div class="input-group">
                <label for="bone_mass">Bone Mass (<span class="unit-label">kg</span>)</label>
                <input type="number" id="bone_mass" name="bone_mass" step="0.1" placeholder="0.0">
            </div>
        </div>

        <div class="form-grid-2">
            <div class="input-group">
                <label for="hydration">Hydration (%)</label>
                <input type="number" id="hydration" name="hydration" step="0.1" placeholder="0.0">
            </div>
            <div class="input-group">
                <label for="bmi">BMI (Optional)</label>
                <input type="number" id="bmi" name="bmi" step="0.1" placeholder="0.0">
            </div>
        </div>

        <div class="mt-5">
            <button type="submit" id="sync-btn" class="btn btn-lg">
                <span id="btn-icon-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </span>
                <span id="btn-text">Sync to Garmin</span>
            </button>
        </div>
    </form>

    <div id="status-container" class="mt-5 fade-in" style="display: none;">
        <div id="status-box" class="status-box is-pending">
            <span id="status-icon">
                <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 11-6.22-8.56"></path>
                </svg>
            </span>
            <span id="status-text">Syncing your results...</span>
        </div>
        <div id="status-log" class="log-block" style="max-height: 220px;"></div>
    </div>
</div>

<script>
    const iconSpin = '<svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-6.22-8.56"></path></svg>';
    const iconSend = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
    const iconCheck = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
    const iconX = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
    const iconAlert = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';

    document.addEventListener('DOMContentLoaded', () => {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('timestamp').value = now.toISOString().slice(0, 16);

        const savedUnit = localStorage.getItem('weight_unit') || 'kg';
        updateUnits(savedUnit, false);

        if (savedUnit === 'lbs') {
            document.querySelector('input[name="unit"][value="lbs"]').checked = true;
        } else {
            document.querySelector('input[name="unit"][value="kg"]').checked = true;
        }
    });

    function updateUnits(unit, save = true) {
        if (save) localStorage.setItem('weight_unit', unit);
        document.getElementById('selected_unit').value = unit;
        document.querySelectorAll('.unit-label').forEach(l => l.textContent = unit);

        const kgLabel = document.getElementById('unit-kg-label');
        const lbsLabel = document.getElementById('unit-lbs-label');
        kgLabel.classList.toggle('active', unit === 'kg');
        lbsLabel.classList.toggle('active', unit === 'lbs');
    }

    document.getElementById('manual-form').addEventListener('submit', function (e) {
        e.preventDefault();

        const btn = document.getElementById('sync-btn');
        const btnIconWrap = document.getElementById('btn-icon-wrap');
        const btnText = document.getElementById('btn-text');
        const statusContainer = document.getElementById('status-container');
        const statusBox = document.getElementById('status-box');
        const statusIcon = document.getElementById('status-icon');
        const statusText = document.getElementById('status-text');
        const statusLog = document.getElementById('status-log');

        btn.disabled = true;
        btnIconWrap.innerHTML = iconSpin;
        btnText.textContent = 'Processing...';

        statusContainer.style.display = 'block';
        statusBox.className = 'status-box is-pending';
        statusIcon.innerHTML = iconSpin;
        statusText.textContent = 'Uploading metrics to Garmin Connect...';
        statusLog.textContent = 'Initializing connection to Garmin services...';

        const formData = new FormData(this);
        const data = {};
        formData.forEach((value, key) => {
            if (value) data[key] = value;
        });

        if (data.timestamp) {
            let ts = data.timestamp;
            if (ts.length === 16) ts += ':00';

            const now = new Date();
            const offsetMins = now.getTimezoneOffset();
            const sign = offsetMins > 0 ? '-' : '+';
            const absMins = Math.abs(offsetMins);
            const pad = n => (n < 10 ? '0' + n : n);
            const h = pad(Math.floor(absMins / 60));
            const m = pad(absMins % 60);

            data.timestamp = `${ts}${sign}${h}:${m}`;
        }

        fetch('/manual/sync', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
            .then(r => r.json())
            .then(res => {
                btn.disabled = false;
                btnIconWrap.innerHTML = iconSend;
                btnText.textContent = 'Sync to Garmin';

                if (res.status === 'Success') {
                    statusBox.className = 'status-box is-success';
                    statusIcon.innerHTML = iconCheck;
                    statusText.textContent = 'Measurement Synced Successfully';
                } else {
                    statusBox.className = 'status-box is-error';
                    statusIcon.innerHTML = iconX;
                    statusText.textContent = 'Sync Failed';
                }
                statusLog.textContent = res.output;
            })
            .catch(err => {
                btn.disabled = false;
                btnIconWrap.innerHTML = iconSend;
                btnText.textContent = 'Sync to Garmin';
                statusBox.className = 'status-box is-error';
                statusIcon.innerHTML = iconAlert;
                statusText.textContent = 'Connection Error';
                statusLog.textContent = 'Request failed: ' + err;
            });
    });
</script>
{% endblock %}
