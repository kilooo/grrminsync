{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Historical Data Sync</h1>
        <p>Import past data from Withings to Garmin.</p>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <div class="card-title">
            <div class="card-title-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </div>
            <div>
                <h2>Select Time Range</h2>
                <p class="card-desc" style="margin: 2px 0 0;">Syncing long periods may take a while.</p>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <div class="radio-chips" role="radiogroup">
            <label class="radio-chip active" id="chip-days">
                <input type="radio" name="sync-mode" value="days" checked onchange="toggleMode()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="width:14px;height:14px;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                Last X Days
            </label>
            <label class="radio-chip" id="chip-dates">
                <input type="radio" name="sync-mode" value="dates" onchange="toggleMode()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="width:14px;height:14px;">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                </svg>
                Date Range
            </label>
        </div>

        <div id="input-days" class="mt-4">
            <div class="input-group">
                <label>Sync the last</label>
                <div class="row">
                    <input type="number" id="days" value="30" min="1" max="3650" style="width: 120px;">
                    <span style="color: var(--text-muted); font-size: 0.9rem;">days</span>
                </div>
            </div>
        </div>

        <div id="input-dates" class="mt-4" style="display: none;">
            <div class="form-grid-2">
                <div class="input-group">
                    <label>From</label>
                    <input type="date" id="from-date">
                </div>
                <div class="input-group">
                    <label>To (optional)</label>
                    <input type="date" id="to-date">
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <button id="sync-btn" class="btn" onclick="triggerHistoricalSync()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="8 17 12 21 16 17"></polyline>
                <line x1="12" y1="12" x2="12" y2="21"></line>
                <path d="M20.88 18.09A5 5 0 0018 9h-1.26A8 8 0 103 16.29"></path>
            </svg>
            Start Import
        </button>
    </div>

    <div id="progress-container" class="mt-5 fade-in" style="display: none;">
        <div class="progress">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="progress-text"
            style="margin-top: 10px; font-weight: 600; color: var(--text); font-size: 0.9rem;">Starting...</div>
    </div>

    <div id="status" class="log-block mt-4" style="display: none;"></div>
</div>

<script>
    let pollInterval;

    function toggleMode() {
        const isDays = document.getElementById('chip-days').querySelector('input').checked;
        document.getElementById('input-days').style.display = isDays ? 'block' : 'none';
        document.getElementById('input-dates').style.display = isDays ? 'none' : 'block';
        document.getElementById('chip-days').classList.toggle('active', isDays);
        document.getElementById('chip-dates').classList.toggle('active', !isDays);
    }

    function triggerHistoricalSync() {
        const isDays = document.getElementById('chip-days').querySelector('input').checked;
        let payload = {};

        if (isDays) {
            const days = document.getElementById('days').value;
            if (!days || days < 1) { alert('Please enter a valid number of days'); return; }
            payload = { days: parseInt(days) };
        } else {
            const fromDate = document.getElementById('from-date').value;
            const toDate = document.getElementById('to-date').value;
            if (!fromDate) { alert('Please select a start date'); return; }
            payload = { from_date: fromDate, to_date: toDate };
        }

        document.getElementById('sync-btn').disabled = true;
        document.getElementById('progress-container').style.display = 'block';
        document.getElementById('progress-bar').style.width = '0%';
        document.getElementById('progress-text').textContent = 'Starting sync...';
        document.getElementById('status').style.display = 'block';
        document.getElementById('status').textContent = 'Initializing...';

        fetch('/historical/sync', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'started') {
                    pollProgress();
                } else {
                    alert('Error: ' + data.message);
                    document.getElementById('sync-btn').disabled = false;
                }
            })
            .catch(err => {
                alert('Request failed: ' + err);
                document.getElementById('sync-btn').disabled = false;
            });
    }

    function pollProgress() {
        if (pollInterval) clearInterval(pollInterval);

        pollInterval = setInterval(() => {
            fetch('/progress')
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'running' || data.status === 'idle') {
                        if (data.total > 0) {
                            const pct = Math.round((data.current / data.total) * 100);
                            document.getElementById('progress-bar').style.width = pct + '%';
                            document.getElementById('progress-text').textContent =
                                `Syncing: ${data.current} / ${data.total} measurements (${pct}%)`;
                        } else {
                            document.getElementById('progress-text').textContent = data.message || 'Initializing...';
                        }
                    }

                    if (data.log) {
                        const statusDiv = document.getElementById('status');
                        statusDiv.textContent = data.log;
                        statusDiv.scrollTop = statusDiv.scrollHeight;
                    }

                    if (data.status === 'Success' || data.status === 'Failed' ||
                        data.status === 'completed' || data.status === 'failed') {
                        clearInterval(pollInterval);
                        document.getElementById('sync-btn').disabled = false;
                        const success = data.status === 'Success' || data.status === 'completed';
                        document.getElementById('progress-bar').style.width = '100%';
                        document.getElementById('progress-text').textContent = success
                            ? '✓ Sync Completed'
                            : '✗ Sync Failed';
                        document.getElementById('progress-text').style.color = success ? 'var(--success)' : 'var(--danger)';
                    }
                });
        }, 1000);
    }
</script>
{% endblock %}
